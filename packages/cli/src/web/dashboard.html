<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWC Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;line-height:1.5}
:root{--green:#3fb950;--blue:#58a6ff;--red:#f85149;--yellow:#d2991d;--gray:#8b949e;--border:#30363d;--bg-card:#161b22;--bg-hover:#1c2129;--radius:8px}

header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{font-size:20px;font-weight:600;color:#f0f6fc;display:flex;align-items:center;gap:8px}
header h1 span{color:var(--green);font-size:14px;font-weight:400;background:rgba(63,185,80,.12);padding:2px 10px;border-radius:12px}
.header-right{display:flex;align-items:center;gap:12px}
.scheduler-indicator{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray)}
.scheduler-dot{width:8px;height:8px;border-radius:50%;background:var(--gray)}
.scheduler-dot.running{background:var(--green);box-shadow:0 0 6px var(--green)}

.btn{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn:hover{background:#30363d;border-color:#8b949e}
.btn-primary{background:#238636;border-color:#238636;color:#fff}
.btn-primary:hover{background:#2ea043}
.btn-danger{color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:rgba(248,81,73,.12)}
.btn-sm{padding:3px 10px;font-size:12px}
.btn-xs{padding:2px 8px;font-size:11px;border-radius:4px}

main{max-width:1400px;margin:0 auto;padding:24px}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.toolbar h2{font-size:16px;color:#f0f6fc}
.toolbar .hint{color:var(--gray);font-size:12px}
.task-count{color:var(--gray);font-size:13px}

.workspaces-grid{display:flex;flex-direction:column;gap:16px}

.workspace-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s}
.workspace-card:hover{border-color:#8b949e}
.workspace-card.expanded{border-color:var(--blue)}

.ws-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none}
.ws-header:hover{background:var(--bg-hover)}
.ws-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-dot.pending{background:var(--gray)}
.status-dot.scheduled{background:var(--blue)}
.status-dot.running{background:var(--yellow);animation:pulse 1s infinite}
.status-dot.success{background:var(--green)}
.status-dot.failed{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.ws-name{font-weight:600;color:#f0f6fc;font-size:14px}
.ws-dir{font-family:'Cascadia Code','Fira Code',monospace;font-size:11px;color:#484f58;margin-left:4px}
.ws-meta{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--gray);flex-shrink:0}
.ws-actions{display:flex;gap:6px;flex-shrink:0;margin-left:12px}

.ws-body{display:none;border-top:1px solid var(--border)}
.workspace-card.expanded .ws-body{display:block}

/* tabs */
.ws-tabs{display:flex;border-bottom:1px solid var(--border);background:#0d1117;padding:0 16px}
.ws-tab{padding:8px 14px;font-size:12px;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.ws-tab:hover{color:#c9d1d9}
.ws-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.ws-tab-badge{font-size:10px;margin-left:4px;color:#484f58}
.ws-tab-content{display:none;padding:16px 18px}
.ws-tab-content.active{display:block}

/* overview */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ov-label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ov-val{font-size:13px;color:#c9d1d9}
.ov-prompt{background:#0d1117;border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-size:12px;color:#8b949e;font-family:'Cascadia Code','Fira Code',monospace;white-space:pre-wrap;max-height:100px;overflow-y:auto}

/* directory tree */
.dir-tree{font-family:'Cascadia Code','Fira Code',monospace;font-size:12px;line-height:1.8}
.dir-tree .entry{color:#c9d1d9;padding-left:2px}
.dir-tree .entry.dir{color:var(--blue)}
.dir-tree .entry.file{color:#8b949e}
.dir-tree .entry.file.config{color:var(--yellow)}
.dir-tree .entry.file.skill{color:var(--green)}
.dir-tree .entry.file.agents{color:var(--green)}
.dir-tree .entry.file.yaml{color:var(--yellow)}
.dir-tree .prefix{color:#30363d}

/* permissions table */
.perm-table{width:100%;font-size:12px;border-collapse:collapse}
.perm-table th{text-align:left;padding:6px 10px;color:var(--gray);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase}
.perm-table td{padding:5px 10px;border-bottom:1px solid var(--border)}
.perm-table tr:hover td{background:var(--bg-hover)}
.perm-badge{padding:1px 8px;border-radius:10px;font-size:11px;font-weight:500}
.perm-badge.allow{background:rgba(63,185,80,.15);color:var(--green)}
.perm-badge.ask{background:rgba(210,153,29,.15);color:var(--yellow)}
.perm-badge.deny{background:rgba(248,81,73,.15);color:var(--red)}

/* skills */
.skill-item{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px}
.skill-item h4{font-size:13px;color:var(--green);margin-bottom:4px;font-family:'Cascadia Code','Fira Code',monospace}
.skill-item pre{font-size:11px;color:#8b949e;font-family:'Cascadia Code','Fira Code',monospace;white-space:pre-wrap;max-height:120px;overflow-y:auto;margin-top:4px}

/* history table */
.history-table{width:100%;font-size:12px;border-collapse:collapse}
.history-table th{text-align:left;padding:6px 10px;color:var(--gray);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase}
.history-table td{padding:5px 10px;border-bottom:1px solid var(--border)}
.history-table tr:hover td{background:var(--bg-hover)}

/* output files */
.output-item{padding:4px 0;font-size:12px;display:flex;gap:8px;align-items:center}
.output-item .name{color:var(--blue);cursor:pointer}
.output-item .name:hover{text-decoration:underline}
.output-item .size{color:var(--gray);font-size:11px}

/* scripts */
.script-item{padding:4px 0;font-size:12px;color:var(--yellow);font-family:'Cascadia Code','Fira Code',monospace}

/* logs */
.logs-panel{position:fixed;bottom:0;left:0;right:0;background:#0d1117;border-top:1px solid var(--border);max-height:160px;overflow-y:auto;font-family:'Cascadia Code','Fira Code',monospace;font-size:11px;padding:8px 24px;z-index:5}
.log-entry{padding:2px 0;display:flex;gap:8px}
.log-entry .time{color:#484f58;flex-shrink:0}
.log-entry.info{color:var(--blue)}
.log-entry.warn{color:var(--yellow)}
.log-entry.error{color:var(--red)}

/* empty */
.empty-state{text-align:center;padding:60px 20px;color:var(--gray)}
.empty-state h3{color:#8b949e;margin-bottom:8px;font-size:16px}
.empty-state p{font-size:13px}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;width:90%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;color:#f0f6fc;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:var(--gray);margin-bottom:4px;font-weight:500}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:8px 12px;background:#0d1117;border:1px solid var(--border);border-radius:6px;color:#c9d1d9;font-size:13px;font-family:inherit;outline:none}
.form-group input:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-group textarea{min-height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

.toast{position:fixed;top:20px;right:20px;padding:10px 18px;border-radius:8px;font-size:13px;z-index:200;animation:slideIn .2s ease-out;pointer-events:none}
.toast.success{background:#238636;color:#fff}
.toast.error{background:#da3633;color:#fff}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

.output-preview{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;align-items:center;justify-content:center}
.output-preview.open{display:flex}
.output-preview .modal{max-width:800px}
.output-preview pre{font-size:12px;max-height:60vh;overflow:auto;background:#0d1117;padding:12px;border-radius:6px;font-family:'Cascadia Code','Fira Code',monospace;color:#c9d1d9;white-space:pre-wrap}

.detail-prompt{background:#0d1117;border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-size:12px;color:#8b949e;font-family:'Cascadia Code','Fira Code',monospace;white-space:pre-wrap;max-height:120px;overflow-y:auto;margin-bottom:12px}

@media(max-width:768px){.ws-meta{gap:8px}.ws-dir{display:none}.form-row{grid-template-columns:1fr}header{padding:10px 14px}main{padding:14px}.ov-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <h1>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    WWC <span>AI Scheduler</span>
  </h1>
  <div class="header-right">
    <div class="scheduler-indicator">
      <div class="scheduler-dot" id="schedulerDot"></div>
      <span id="schedulerLabel">Scheduler: Off</span>
    </div>
    <button class="btn btn-primary btn-sm" id="btnScheduler" onclick="toggleScheduler()">Start</button>
    <button class="btn btn-sm" onclick="openCreateModal()">+ New Workspace</button>
  </div>
</header>

<main id="main">
  <div class="toolbar">
    <h2>Workspaces</h2>
    <span class="hint">each workspace = one directory = one task with its own .opencode/ config</span>
    <span class="task-count" id="taskCount"></span>
  </div>
  <div class="workspaces-grid" id="grid">
    <div class="empty-state">
      <h3>No workspaces yet</h3>
      <p>Click "+ New Workspace" to create a task directory with opencode.json, skills, and scripts.</p>
    </div>
  </div>
</main>

<div id="logsPanel" class="logs-panel" style="display:none"></div>

<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h3>New Workspace</h3>
    <div class="form-group"><label>Name *</label><input id="cName" placeholder="e.g. daily-news-summary"/></div>
    <div class="form-group"><label>Description</label><input id="cDesc" placeholder="Brief description"/></div>
    <div class="form-group"><label>Project Directory</label><input id="cProjectDir" placeholder="Default: tasks/&lt;name&gt; (leave empty for default)"/></div>
    <div class="form-row">
      <div class="form-group"><label>Cron Schedule</label><input id="cSchedule" value="0 9 * * *"/></div>
      <div class="form-group"><label>Timezone</label><input id="cTimezone" value="Asia/Shanghai"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Model (optional)</label><input id="cModel" placeholder="default if empty"/></div>
      <div class="form-group"><label>Agent</label><input id="cAgent" value="default"/></div>
    </div>
    <div class="form-group"><label>Prompt</label><textarea id="cPrompt" placeholder="What should the AI agent do?"></textarea></div>
    <div class="form-group"><label>Skills <span style="color:var(--gray);font-size:11px">(comma-separated, SKILL.md auto-created in .opencode/skills/)</span></label><input id="cSkills" placeholder="e.g. news-digest, code-review"/></div>
    <div class="form-group"><label>External Directories <span style="color:var(--gray);font-size:11px">(one per line: path:perm:rw, e.g. D:/data:allow:rw)</span></label><textarea id="cExternalDirs" placeholder="D:\data:allow:rw&#10;C:\output:allow:w&#10;-- or leave empty to deny all --" style="min-height:50px"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeCreateModal()">Cancel</button>
      <button class="btn btn-primary" id="btnCreate" onclick="createTask()">Create</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<div class="output-preview" id="outputPreview"><div class="modal"><h3 id="opTitle"></h3><pre id="opContent"></pre><div class="modal-actions"><button class="btn" onclick="document.getElementById('outputPreview').classList.remove('open')">Close</button></div></div></div>

<script>
const API='';

async function api(path,opts={}){
  const res=await fetch(API+path,{headers:opts.body?{'Content-Type':'application/json'}:{},...opts});
  if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error||res.statusText)}
  return res.json();
}

const evtSource=new EventSource(API+'/api/events');
evtSource.addEventListener('update',()=>loadTasks());
evtSource.addEventListener('log',(e)=>{const d=JSON.parse(e.data);addLog(d.level,d.msg);});

const logEntries=[];
function addLog(level,msg){
  const p=document.getElementById('logsPanel');p.style.display='block';
  const now=new Date().toLocaleTimeString();
  logEntries.push({level,msg,time:now});if(logEntries.length>50)logEntries.shift();
  p.innerHTML=logEntries.map(l=>`<div class="log-entry ${l.level}"><span class="time">${l.time}</span>${l.msg}</div>`).join('');
  p.scrollTop=p.scrollHeight;
}

let workspaceData={};

async function loadTasks(){
  let tasks;try{tasks=await api('/api/tasks')}catch{return}
  const grid=document.getElementById('grid');
  const count=document.getElementById('taskCount');
  if(!tasks||tasks.length===0){
    grid.innerHTML='<div class="empty-state"><h3>No workspaces yet</h3><p>Click "+ New Workspace" to create a task directory with opencode.json, skills, and scripts.</p></div>';
    count.textContent='';return;
  }
  count.textContent=`${tasks.length} workspace${tasks.length>1?'s':''}`;
  grid.innerHTML=tasks.map(t=>renderCard(t)).join('');

  for(const t of tasks){
    if(t.config?.name)loadWorkspaceDetails(t.config.name);
  }

  grid.querySelectorAll('.ws-header').forEach(h=>{h.addEventListener('click',(e)=>{if(e.target.closest('button'))return;h.closest('.workspace-card').classList.toggle('expanded')})});
  grid.querySelectorAll('.ws-tab').forEach(tab=>{tab.addEventListener('click',(e)=>{e.stopPropagation();switchTab(tab)})});
}

async function loadWorkspaceDetails(name){
  try{
    const[ws,oc,skills,scripts,outputs]=await Promise.all([
      api(`/api/tasks/${encodeURIComponent(name)}/workspace`),
      api(`/api/tasks/${encodeURIComponent(name)}/opencode`),
      api(`/api/tasks/${encodeURIComponent(name)}/skills`),
      api(`/api/tasks/${encodeURIComponent(name)}/scripts`),
      api(`/api/tasks/${encodeURIComponent(name)}/outputs`),
    ]);
    workspaceData[name]={ws,oc,skills,scripts,outputs};
    updateWorkspacePanels(name);
  }catch{}
}

function updateWorkspacePanels(name){
  const d=workspaceData[name];if(!d)return;
  const card=document.querySelector(`.workspace-card[data-name="${escAttr(name)}"]`);if(!card)return;

  // directory tree
  const treeEl=card.querySelector('.dir-tree');if(treeEl)treeEl.innerHTML=renderTree(d.ws.tree,'').join('');
  // permissions table
  const permEl=card.querySelector('.perm-content');if(permEl)permEl.innerHTML=renderPerms(d.oc);
  // skills
  const skillsEl=card.querySelector('.skills-content');if(skillsEl)skillsEl.innerHTML=renderSkills(d.skills);
  // scripts
  const scriptsEl=card.querySelector('.scripts-content');if(scriptsEl)scriptsEl.innerHTML=renderScripts(d.scripts);
  // outputs
  const outputsEl=card.querySelector('.outputs-content');if(outputsEl)outputsEl.innerHTML=renderOutputs(d.outputs,name);
}

function renderTree(tree,prefix){
  const lines=[];
  for(let i=0;i<tree.length;i++){
    const e=tree[i];const last=i===tree.length-1;const connector=last?'└── ':'├── ';
    const childPrefix=last?'    ':'│   ';
    if(e.type==='dir'){
      lines.push(`<div class="entry dir">${esc(prefix+connector)}<b>${esc(e.name)}</b>/</div>`);
      if(e.children&&e.children.length>0)lines.push(...renderTree(e.children,prefix+childPrefix));
    }else{
      let cls='file';if(e.name.endsWith('.yaml')||e.name.endsWith('.json'))cls='file config';else if(e.name==='SKILL.md')cls='file skill';else if(e.name.endsWith('.md')&&e.path.includes('agents'))cls='file agents';
      lines.push(`<div class="entry ${cls}">${esc(prefix+connector)}${esc(e.name)}</div>`);
    }
  }
  return lines;
}

function renderPerms(oc){
  if(!oc||!oc.permission){return '<div style="font-size:12px;color:var(--gray)">No permissions configured</div>'}
  const perm=oc.permission;
  if(typeof perm==='string')return `<div style="font-size:12px">Global: <span class="perm-badge ${perm}">${perm}</span></div>`;
  let rows='';
  for(const[k,v]of Object.entries(perm)){
    if(typeof v==='string'){
      rows+=`<tr><td>${esc(k)}</td><td><span class="perm-badge ${v}">${v}</span></td><td></td></tr>`;
    }else if(typeof v==='object'){
      for(const[pat,rule]of Object.entries(v)){
        rows+=`<tr><td>${esc(k)}</td><td><code style="font-size:11px">${esc(pat)}</code></td><td><span class="perm-badge ${rule}">${rule}</span></td></tr>`;
      }
    }
  }
  return `<table class="perm-table"><thead><tr><th>Tool</th><th>Pattern/Scope</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderSkills(skills){
  if(!skills||!skills.length)return '<div style="font-size:12px;color:var(--gray)">No skills defined</div>';
  return skills.map(s=>`
    <div class="skill-item">
      <h4>📋 .opencode/skills/${esc(s.name)}/SKILL.md</h4>
      ${s.content?`<pre>${esc(s.content).slice(0,500)}${s.content.length>500?'...':''}</pre>`:'<div style="font-size:12px;color:var(--red)">SKILL.md not found</div>'}
    </div>
  `).join('');
}

function renderScripts(scripts){
  if(!scripts||!scripts.length)return '<div style="font-size:12px;color:var(--gray)">No scripts</div>';
  return scripts.map(s=>`<div class="script-item">📜 scripts/${esc(s)}</div>`).join('');
}

function renderOutputs(outputs,name){
  if(!outputs||!outputs.length)return '<div style="font-size:12px;color:var(--gray)">No output files</div>';
  return outputs.map(o=>`
    <div class="output-item">
      <span class="name" onclick="previewOutput('${escAttr(name)}','${escAttr(o.name)}')">📄 ${esc(o.name)}</span>
      <span class="size">${(o.size/1024).toFixed(1)}KB · ${new Date(o.mtime).toLocaleString()}</span>
    </div>
  `).join('');
}

function renderCard(t){
  const sched=t.config?.schedule||{};
  const exec=t.config?.execution||{};
  const nextRun=t.nextRun?new Date(t.nextRun).toLocaleString():'—';
  const sc=statusClass(t.status);

  const historyRows=(t.history||[]).slice(-10).reverse().map(h=>`
    <tr><td>${new Date(h.startedAt).toLocaleString()}</td><td><span style="color:${h.status==='success'?'#3fb950':'#f85149'}">${h.status}</span></td><td>${h.exitCode!=null?h.exitCode:'—'}</td></tr>
  `).join('');

  return `
  <div class="workspace-card" data-name="${escAttr(t.config?.name||'')}">
    <div class="ws-header">
      <div class="ws-left">
        <div class="status-dot ${sc}"></div>
        <span class="ws-name">${esc(t.config?.name||'')}</span>
        <span class="ws-dir">${esc((t.config?.name||'') + '/')}</span>
      </div>
      <div class="ws-meta" onclick="event.stopPropagation()">
        <span>⏰ ${esc(sched.expr||'')}</span>
        <span>▶ ${nextRun}</span>
        <span>${t.runCount||0} runs</span>
      </div>
      <div class="ws-actions" onclick="event.stopPropagation()">
        <button class="btn btn-xs btn-primary" onclick="runTask('${escAttr(t.config?.name||'')}')">▶ Run</button>
        <button class="btn btn-xs btn-danger" onclick="deleteTask('${escAttr(t.config?.name||'')}')">Del</button>
      </div>
    </div>
    <div class="ws-body">
      <div class="ws-tabs">
        <div class="ws-tab active" data-tab="overview">Overview</div>
        <div class="ws-tab" data-tab="tree">📁 Directory</div>
        <div class="ws-tab" data-tab="permissions">🔐 Permissions</div>
        <div class="ws-tab" data-tab="skills">🧩 Skills<span class="ws-tab-badge"></span></div>
        <div class="ws-tab" data-tab="scripts">📜 Scripts</div>
        <div class="ws-tab" data-tab="outputs">📤 Output</div>
        <div class="ws-tab" data-tab="history">📋 History<span class="ws-tab-badge">${t.runCount||0}</span></div>
      </div>

      <div class="ws-tab-content active" data-tab="overview">
        <div class="ov-grid">
          <div><div class="ov-label">Schedule</div><div class="ov-val">${esc(sched.expr||'')} (${esc(sched.timezone||'')})</div></div>
          <div><div class="ov-label">Next Run</div><div class="ov-val">${nextRun}</div></div>
          <div><div class="ov-label">Last Run</div><div class="ov-val">${t.lastRun?new Date(t.lastRun).toLocaleString():'Never'}</div></div>
          <div><div class="ov-label">Model</div><div class="ov-val">${esc(exec.model||'default')}</div></div>
          <div><div class="ov-label">Agent</div><div class="ov-val">${esc(exec.agent||'default')}</div></div>
          <div><div class="ov-label">Status</div><div class="ov-val">${t.status}</div></div>
        </div>
        <div class="ov-label" style="margin-top:10px">Prompt</div>
        <div class="detail-prompt">${esc(exec.prompt||'—')}</div>
      </div>

      <div class="ws-tab-content" data-tab="tree">
        <div class="dir-tree">Loading...</div>
      </div>

      <div class="ws-tab-content" data-tab="permissions">
        <div class="perm-content">Loading...</div>
      </div>

      <div class="ws-tab-content" data-tab="skills">
        <div class="skills-content">Loading...</div>
      </div>

      <div class="ws-tab-content" data-tab="scripts">
        <div class="scripts-content">Loading...</div>
      </div>

      <div class="ws-tab-content" data-tab="outputs">
        <div class="outputs-content">Loading...</div>
      </div>

      <div class="ws-tab-content" data-tab="history">
        ${historyRows?`<table class="history-table"><thead><tr><th>Time</th><th>Status</th><th>Exit</th></tr></thead><tbody>${historyRows}</tbody></table>`:'<div style="font-size:12px;color:#484f58">No run history</div>'}
      </div>
    </div>
  </div>`;
}

function switchTab(tab){
  const card=tab.closest('.workspace-card');
  card.querySelectorAll('.ws-tab').forEach(t=>t.classList.remove('active'));
  card.querySelectorAll('.ws-tab-content').forEach(c=>c.classList.remove('active'));
  tab.classList.add('active');
  const name=tab.dataset.tab;
  card.querySelector(`.ws-tab-content[data-tab="${name}"]`).classList.add('active');
}

async function previewOutput(taskName,filename){
  try{
    const res=await fetch(`${API}/api/tasks/${encodeURIComponent(taskName)}/output-file/${encodeURIComponent(filename)}`);
    const text=await res.text();
    document.getElementById('opTitle').textContent=filename;
    document.getElementById('opContent').textContent=text;
    document.getElementById('outputPreview').classList.add('open');
  }catch(e){toast(e.message,'error')}
}

document.addEventListener('click',(e)=>{if(e.target===document.getElementById('outputPreview'))document.getElementById('outputPreview').classList.remove('open')});

function statusClass(s){const m={pending:'pending',scheduled:'scheduled',running:'running',success:'success',failed:'failed'};return m[s]||'pending'}
function esc(s){if(typeof s!=='string')return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escAttr(s){if(typeof s!=='string')return'';return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

async function toggleScheduler(){
  try{
    const s=await api('/api/scheduler');
    if(s.running){await api('/api/scheduler/stop',{method:'POST'});updateSchedulerUI(false);toast('Scheduler stopped','success')}
    else{await api('/api/scheduler/start',{method:'POST'});updateSchedulerUI(true);toast('Scheduler started','success');document.getElementById('logsPanel').style.display='block'}
  }catch(e){toast(e.message,'error')}
}

function updateSchedulerUI(r){
  const dot=document.getElementById('schedulerDot'),label=document.getElementById('schedulerLabel'),btn=document.getElementById('btnScheduler');
  if(r){dot.className='scheduler-dot running';label.textContent='Scheduler: Running';btn.textContent='Stop';btn.className='btn btn-sm btn-danger'}
  else{dot.className='scheduler-dot';label.textContent='Scheduler: Off';btn.textContent='Start';btn.className='btn btn-primary btn-sm'}
}

async function checkSchedulerStatus(){try{const s=await api('/api/scheduler');updateSchedulerUI(s.running)}catch{}}

async function runTask(name){try{await api(`/api/tasks/${encodeURIComponent(name)}/run`,{method:'POST'});toast(`"${name}" started`,'success');setTimeout(loadTasks,2000)}catch(e){toast(e.message,'error')}}
async function deleteTask(name){if(!confirm(`Delete workspace "${name}"? This removes the entire directory.`))return;try{await api(`/api/tasks/${encodeURIComponent(name)}`,{method:'DELETE'});toast(`"${name}" deleted`,'success');loadTasks()}catch(e){toast(e.message,'error')}}

function openCreateModal(){document.getElementById('createModal').classList.add('open')}
function closeCreateModal(){document.getElementById('createModal').classList.remove('open')}

function parseExternalDirs(text){
  if(!text||!text.trim())return undefined;
  return text.split('\n').map(l=>l.trim()).filter(Boolean).map(line=>{
    const parts=line.split(':');
    let path,permStart=1;
    if(parts.length>1&&/^[A-Za-z]$/.test(parts[0])&&/^[/\\]/.test(parts[1]||'')){path=parts[0]+':'+parts[1];permStart=2}else{path=parts[0]}
    if(!path)return null;
    const ext={path,permission:'allow',read:true,write:true,exec:true};
    for(let i=permStart;i<parts.length;i++){
      const p=parts[i].toLowerCase();
      if(p==='allow'||p==='deny'){ext.permission=p;if(p==='deny'){ext.read=ext.write=ext.exec=false}}
      else if(p==='r')ext.read=true;else if(p==='w')ext.write=true;else if(p==='x')ext.exec=true
      else if(p==='ro'){ext.read=true;ext.write=false;ext.exec=false}
    }
    return ext;
  }).filter(Boolean);
}

async function createTask(){
  const name=document.getElementById('cName').value.trim();
  if(!name){toast('Name is required','error');return}
  const projectDir=document.getElementById('cProjectDir').value.trim()||undefined;
  const skillsRaw=document.getElementById('cSkills').value.trim();
  const skills=skillsRaw?skillsRaw.split(',').map(s=>s.trim()).filter(Boolean):undefined;
  const externalDirs=parseExternalDirs(document.getElementById('cExternalDirs').value);

  const body={
    name,
    description:document.getElementById('cDesc').value.trim(),
    projectDir,
    schedule:{type:'cron',expr:document.getElementById('cSchedule').value.trim(),timezone:document.getElementById('cTimezone').value.trim()},
    execution:{prompt:document.getElementById('cPrompt').value.trim(),model:document.getElementById('cModel').value.trim()||undefined,agent:document.getElementById('cAgent').value.trim()||'default',timeout:600,retry:{max:2,delay:60}},
    skills,
    externalDirs,
  };
  try{await api('/api/tasks',{method:'POST',body:JSON.stringify(body)});closeCreateModal();loadTasks();toast(`"${name}" created`,'success')}catch(e){toast(e.message,'error')}
}

function toast(msg,type){const c=document.getElementById('toastContainer');const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3000)}

loadTasks();checkSchedulerStatus();
document.getElementById('createModal').addEventListener('click',(e)=>{if(e.target===e.currentTarget)closeCreateModal()});
</script>
</body>
